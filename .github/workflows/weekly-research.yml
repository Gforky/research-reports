name: Weekly AI Research Report

on:
  schedule:
    # Every Monday at 9:00 AM UTC = 17:00 CST
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  research:
    runs-on: ubuntu-latest
    container: node:20
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install OpenClaw
        run: npm install -g openclaw
      
      - name: Set Git identity
        run: |
          git config user.email "zero@agent.local"
          git config user.name "Zero Agent"
      
      - name: Run Weekly Research
        env:
          OPENCLAW_API_KEY: ${{ secrets.OPENCLAW_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          # Generate research report using academic-deep-research-evolving skill
          # Data sources filtered to last 2 weeks via web_search freshness parameter
          echo "Running weekly research with 2-week freshness filter..."
          
          # Create report with timestamp
          REPORT_DATE=$(date +%Y-%m-%d)
          REPORT_NAME="weekly-ai-research-${REPORT_DATE}.md"
          
          # The actual research is triggered via OpenClaw API
          # This workflow triggers the main agent to execute the skill
          curl -X POST "http://localhost:8080/api/research" \
            -H "Authorization: Bearer $OPENCLAW_API_KEY" \
            -d '{
              "skill": "academic-deep-research-evolving",
              "params": {
                "topics": ["LLM training efficiency", "AI systems", "ML optimization"],
                "freshness": "2w",
                "output_path": "weekly-ai-research-${REPORT_DATE}.md"
              }
            }'
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: add weekly research report $(date +%Y-%m-%d)"
          title: "Weekly Research Report - $(date +%Y-%m-%d)"
          body: |
            ## Weekly AI Research Report
            
            Generated by Zero Agent using `academic-deep-research-evolving` skill.
            
            **Data sources:** Last 2 weeks only (freshness filter enabled)
            
            ---
            *This PR was auto-generated by GitHub Actions*
          branch: weekly-report-$(date +%Y-%m-%d)
          delete-branch: true

  notify:
    runs-on: ubuntu-latest
    needs: research
    if: always()
    
    steps:
      - name: Notify via Feishu
        if: vars.FEISHU_WEBHOOK_URL != ''
        run: |
          curl -X POST "${{ vars.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "📊 Weekly AI Research Report 已生成并提交至 GitHub: https://github.com/Gforky/research-reports"
              }
            }'
